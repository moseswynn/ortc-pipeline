name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply
      aws_region:
        description: "AWS region"
        required: false
        default: "us-east-1"

permissions:
  contents: read

env:
  AWS_REGION: ${{ inputs.aws_region }}
  TF_VAR_aws_region: ${{ inputs.aws_region }}

jobs:
  build-push:
    name: Build & Push Docker Images
    if: inputs.action == 'apply'
    runs-on: ubuntu-latest
    outputs:
      rest_server_image: ${{ steps.images.outputs.rest_server }}
      ortc_server_image: ${{ steps.images.outputs.ortc_server }}
      bench_image: ${{ steps.images.outputs.bench }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap (S3 state bucket + ECR repos)
        run: scripts/bootstrap.sh

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies & seed database
        run: |
          uv sync
          uv run python -m src.db

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: images
        run: |
          ECR_BASE="${{ steps.ecr-login.outputs.registry }}"
          TAG="${{ github.sha }}"
          echo "rest_server=${ECR_BASE}/ortc-pipeline/rest-server:${TAG}" >> "$GITHUB_OUTPUT"
          echo "ortc_server=${ECR_BASE}/ortc-pipeline/ortc-server:${TAG}" >> "$GITHUB_OUTPUT"
          echo "bench=${ECR_BASE}/ortc-pipeline/bench:${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ecr_base=${ECR_BASE}" >> "$GITHUB_OUTPUT"

      - name: Build & push rest-server
        run: |
          docker build -f docker/rest-server.Dockerfile -t "${{ steps.images.outputs.rest_server }}" .
          docker push "${{ steps.images.outputs.rest_server }}"

      - name: Build & push ortc-server
        run: |
          docker build -f docker/ortc-server.Dockerfile -t "${{ steps.images.outputs.ortc_server }}" .
          docker push "${{ steps.images.outputs.ortc_server }}"

      - name: Build & push bench
        run: |
          docker build -f docker/bench.Dockerfile -t "${{ steps.images.outputs.bench }}" .
          docker push "${{ steps.images.outputs.bench }}"

  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest
    needs: [build-push]
    if: always() && (inputs.action == 'destroy' || needs.build-push.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Bootstrap (S3 state bucket + ECR repos)
        run: scripts/bootstrap.sh

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var "rest_server_image=${{ needs.build-push.outputs.rest_server_image }}" \
            -var "ortc_server_image=${{ needs.build-push.outputs.ortc_server_image }}" \
            -var "bench_image=${{ needs.build-push.outputs.bench_image }}"

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        working-directory: infra
        run: |
          terraform destroy -auto-approve \
            -var "rest_server_image=placeholder" \
            -var "ortc_server_image=placeholder" \
            -var "bench_image=placeholder"

      - name: Show outputs
        if: inputs.action == 'apply'
        working-directory: infra
        run: terraform output
